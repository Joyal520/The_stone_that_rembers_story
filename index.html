<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Stories - Edtechra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            background-color: #0f172a;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Full Screen Cover Layout --- */
        .full-screen-cover {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative;
            text-decoration: none;
            z-index: 1;
            padding: 1.5rem;
        }

        .full-screen-img {
            width: 100%;
            height: auto;
            max-height: calc(100vh - 100px); /* Leave room for CTA button below */
            object-fit: contain;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .full-screen-cover:hover .full-screen-img {
            transform: scale(1.02);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
        }

        .cta-overlay {
            margin-top: 1.5rem;
            z-index: 10;
        }

        .read-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #fbbf24;
            border: none;
            border-radius: 99px;
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            white-space: nowrap; /* Keep on one line */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
        }

        .full-screen-cover:hover .read-btn {
            background: #ffffff;
            color: #000;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.4);
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

    <!-- Main Story Full Screen -->
    <a href="Frontcover.html" class="full-screen-cover">
        <img src="coverpage.jpg" alt="The Stone That Remembers" class="full-screen-img"
            onerror="this.src='https://images.unsplash.com/photo-1542259681-d419a4d74268?q=80&w=1000&auto=format&fit=crop'">
        <div class="cta-overlay">
            <span class="read-btn">Start Reading</span>
        </div>
    </a>

</body>

</html>
